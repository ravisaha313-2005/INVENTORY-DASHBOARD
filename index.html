```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Dashboard - Ravi</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Consolas, monospace;
background:#000;
color:#00ff66;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h1{
text-shadow:0 0 15px #00ff66;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#111;
border:1px solid #00ff66;
padding:20px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px #00ff66;
}

.card p{
font-size:28px;
font-weight:bold;
}

.form-box{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.form-box input{
padding:10px;
background:#111;
border:1px solid #00ff66;
color:#00ff66;
min-width:180px;
}

button{
padding:10px 15px;
border:none;
cursor:pointer;
border-radius:5px;
background:#00aa44;
color:white;
}

button:hover{
background:#00cc55;
}

table{
width:100%;
border-collapse:collapse;
background:#111;
}

th,td{
border:1px solid #00ff66;
padding:10px;
text-align:center;
}

th{
background:#00aa44;
color:white;
}

.edit-btn{
background:#ff9800;
}

footer{
margin-top:20px;
text-align:center;
}

@media(max-width:768px){
.form-box{
flex-direction:column;
}

table{
display:block;
overflow-x:auto;
white-space:nowrap;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>INVENTORY DASHBOARD</h1>
<h3>Created By RAVI</h3>
</div>

<div class="cards">
<div class="card">
<h3>Total Process</h3>
<p id="totalProcess">0</p>
</div>

<div class="card">
<h3>Total Working PC</h3>
<p id="totalPC">0</p>
</div>

<div class="card">
<h3>Total Active HC</h3>
<p id="totalHC">0</p>
</div>

<div class="card">
<h3>Status</h3>
<p>LIVE</p>
</div>
</div>

<input type="text" id="searchBox" placeholder="Search Process..." onkeyup="searchTable()">

<br><br>

<div class="form-box">
<input type="text" id="process" placeholder="Process Name">
<input type="text" id="tl" placeholder="TL Name">
<input type="number" id="pc" placeholder="Working PC">
<input type="number" id="hc" placeholder="Active HC">

<button onclick="addData()">Add Data</button>
</div>

<table id="dataTable">
<thead>
<tr>
<th>Date & Time</th>
<th>Process</th>
<th>TL Name</th>
<th>Working PC</th>
<th>Active HC</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>
</table>

<footer>
© 2026 Inventory Dashboard | Created By RAVI
</footer>

</div>

<script>

window.onload=function(){

let savedData=localStorage.getItem("inventoryData");

if(savedData){
document.querySelector("#dataTable tbody").innerHTML=savedData;
updateCards();
}
}

function saveData(){
localStorage.setItem(
"inventoryData",
document.querySelector("#dataTable tbody").innerHTML
);
}

function updateCards(){

let rows=document.querySelectorAll("#dataTable tbody tr");

document.getElementById("totalProcess").innerText=rows.length;

let totalPC=0;
let totalHC=0;

rows.forEach(row=>{
totalPC += Number(row.cells[3].innerText);
totalHC += Number(row.cells[4].innerText);
});

document.getElementById("totalPC").innerText=totalPC;
document.getElementById("totalHC").innerText=totalHC;
}

function addData(){

let process=document.getElementById("process").value;
let tl=document.getElementById("tl").value;
let pc=document.getElementById("pc").value;
let hc=document.getElementById("hc").value;

if(process=="" || tl==""){
alert("Fill all fields");
return;
}

let currentDateTime=new Date().toLocaleString();

let table=document.querySelector("#dataTable tbody");

let row=table.insertRow();

row.insertCell(0).innerHTML=currentDateTime;
row.insertCell(1).innerHTML=process;
row.insertCell(2).innerHTML=tl;
row.insertCell(3).innerHTML=pc;
row.insertCell(4).innerHTML=hc;

row.insertCell(5).innerHTML=
'<button class="edit-btn" onclick="editRow(this)">Edit</button>';

document.getElementById("process").value="";
document.getElementById("tl").value="";
document.getElementById("pc").value="";
document.getElementById("hc").value="";

saveData();
updateCards();
}

function editRow(btn){

let row=btn.parentElement.parentElement;

document.getElementById("process").value=row.cells[1].innerText;
document.getElementById("tl").value=row.cells[2].innerText;
document.getElementById("pc").value=row.cells[3].innerText;
document.getElementById("hc").value=row.cells[4].innerText;

row.remove();

saveData();
updateCards();
}

function searchTable(){

let input=document.getElementById("searchBox").value.toLowerCase();

let rows=document.querySelectorAll("#dataTable tbody tr");

rows.forEach(row=>{

if(row.innerText.toLowerCase().includes(input)){
row.style.display="";
}else{
row.style.display="none";
}

});
}

</script>

</body>
</html>
```
